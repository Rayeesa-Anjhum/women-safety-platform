<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeGuard | Real-time SOS Command Center</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto flex flex-col gap-8">
        <header class="flex justify-between items-center bg-slate-900/40 p-6 rounded-3xl border border-white/5 sticky top-0 z-50">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-red-600 rounded-xl flex items-center justify-center shadow-lg shadow-red-900/20">
                    <span class="font-black text-2xl text-white">S</span>
                </div>
                <h1 class="text-3xl font-black text-white tracking-tighter">SAFEGUARD<span class="text-red-500">.</span></h1>
            </div>
            <div class="flex gap-4">
                <a href="index.html" class="px-6 py-3 rounded-full border border-slate-700 hover:bg-slate-800 transition text-sm">Monitor</a>
                <a href="register.html" class="px-7 py-3 bg-red-600 rounded-full font-bold hover:bg-red-700 transition shadow-lg shadow-red-600/20 text-white text-sm">PROFILE</a>
            </div>
        </header>

        <div class="grid lg:grid-cols-12 gap-8">
            <div class="lg:col-span-5 glass-panel p-10 flex flex-col items-center justify-center text-center">
                <div id="alertInfo" class="mb-10 opacity-0 transition-opacity duration-500">
                    <span class="inline-block px-4 py-1.5 bg-red-500/20 text-red-500 rounded-full text-xs font-bold mb-3 tracking-widest">CRITICAL ALERT BROADCASTING</span>
                    <h2 class="text-4xl font-black text-white">HELP IS REQUESTED</h2>
                </div>

                <button id="sosBtn" onclick="sendSOS()" class="group">
                    <div class="text-white flex flex-col">
                        <span class="text-7xl font-black mb-1">SOS</span>
                        <span id="btnText" class="text-xs font-bold tracking-[0.4em] uppercase opacity-60">TAP IN EMERGENCY</span>
                    </div>
                </button>

                <p class="mt-12 text-slate-500 text-sm max-w-sm">Tapping coordinates broadcast to nearby responders and emergency contacts via Leaflet API.</p>
            </div>

            <div id="mapUI" class="lg:col-span-7 space-y-8 hidden opacity-0 transition-opacity duration-1000">
                <div class="glass-panel p-2 overflow-hidden">
                    <div id="map"></div>
                </div>

                <div class="grid grid-cols-2 gap-6">
                    <div class="stat-card glass-panel">
                        <p class="stat-label">Signal Status</p>
                        <p class="stat-value text-green-400">Excellent</p>
                    </div>
                    <div class="stat-card glass-panel">
                        <p class="stat-label">Responders</p>
                        <p id="resStatus" class="stat-value text-blue-400">0 Active</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
